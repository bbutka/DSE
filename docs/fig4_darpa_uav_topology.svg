<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 520" font-family="Arial, Helvetica, sans-serif" font-size="11">
  <defs>
    <marker id="arr" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5 Z" fill="#555"/>
    </marker>
    <marker id="arr-g" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5 Z" fill="#2e7d32"/>
    </marker>
  </defs>

  <text x="380" y="18" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">DARPA CASE UAV — SoC Topology (translated from AADL)</text>

  <!-- bus_rf -->
  <rect x="30" y="72" width="140" height="24" rx="4" fill="#ffebee" stroke="#c62828" stroke-width="1.5"/>
  <text x="100" y="88" text-anchor="middle" font-size="9" font-weight="bold" fill="#c62828">bus_rf (untrusted)</text>

  <!-- GS (external, untrusted) -->
  <rect x="10" y="24" width="75" height="32" rx="4" fill="#ffcdd2" stroke="#b71c1c" stroke-width="2"/>
  <text x="48" y="44" text-anchor="middle" font-size="10" font-weight="bold" fill="#b71c1c">GS</text>
  <text x="48" y="18" text-anchor="middle" font-size="8" fill="#b71c1c">untrusted master</text>
  <line x1="48" y1="56" x2="60" y2="72" stroke="#b71c1c" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- radio_drv (low domain, bridges RF to MC bus) -->
  <rect x="115" y="24" width="75" height="32" rx="4" fill="#ffe0b2" stroke="#e65100" stroke-width="1.5"/>
  <text x="153" y="44" text-anchor="middle" font-size="10" font-weight="bold" fill="#e65100">radio_drv</text>
  <text x="153" y="18" text-anchor="middle" font-size="8" fill="#e65100">low domain</text>
  <line x1="140" y1="56" x2="130" y2="72" stroke="#e65100" stroke-width="1.5"/>

  <!-- RF bridge arrow -->
  <line x1="170" y1="56" x2="200" y2="122" stroke="#c62828" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <text x="195" y="92" font-size="8" fill="#c62828" font-style="italic" transform="rotate(55,195,92)">RF bridge</text>

  <!-- PEP_MC firewall at bridge point -->
  <rect x="195" y="105" width="85" height="22" rx="3" fill="#fce4ec" stroke="#c62828" stroke-width="1.5"/>
  <text x="238" y="120" text-anchor="middle" font-size="9" font-weight="bold" fill="#c62828">🛡 pep_mc</text>

  <!-- bus_mc (central bus) -->
  <rect x="180" y="135" width="500" height="28" rx="4" fill="#e8e8e8" stroke="#888" stroke-width="1.5"/>
  <text x="430" y="153" text-anchor="middle" font-size="10" fill="#555" font-weight="bold">bus_mc (MC internal)</text>

  <!-- MC processor (master) -->
  <rect x="290" y="78" width="90" height="32" rx="4" fill="#c8e6c9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="335" y="98" text-anchor="middle" font-size="10" font-weight="bold" fill="#2e7d32">MC</text>
  <text x="335" y="72" text-anchor="middle" font-size="8" fill="#2e7d32">master (privileged)</text>
  <line x1="335" y1="110" x2="335" y2="135" stroke="#2e7d32" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- CakeML-verified components (root/high domain) -->
  <rect x="185" y="178" width="70" height="36" rx="4" fill="#fff9c4" stroke="#f57f17" stroke-width="2"/>
  <text x="220" y="196" text-anchor="middle" font-size="9" font-weight="bold" fill="#f57f17">attest</text>
  <text x="220" y="208" text-anchor="middle" font-size="7" fill="#f57f17">◆ CakeML</text>
  <text x="220" y="222" text-anchor="middle" font-size="7" fill="#e65100">root domain</text>
  <line x1="220" y1="163" x2="220" y2="178" stroke="#888" stroke-width="1"/>

  <rect x="262" y="178" width="70" height="36" rx="4" fill="#fff9c4" stroke="#f57f17" stroke-width="2"/>
  <text x="297" y="196" text-anchor="middle" font-size="9" font-weight="bold" fill="#f57f17">fpln_filt</text>
  <text x="297" y="208" text-anchor="middle" font-size="7" fill="#f57f17">◆ CakeML</text>
  <line x1="297" y1="163" x2="297" y2="178" stroke="#888" stroke-width="1"/>

  <rect x="339" y="178" width="70" height="36" rx="4" fill="#fff9c4" stroke="#f57f17" stroke-width="2"/>
  <text x="374" y="196" text-anchor="middle" font-size="9" font-weight="bold" fill="#f57f17">geofence</text>
  <text x="374" y="208" text-anchor="middle" font-size="7" fill="#f57f17">◆ CakeML</text>
  <line x1="374" y1="163" x2="374" y2="178" stroke="#888" stroke-width="1"/>

  <!-- Regular MC-bus components -->
  <rect x="416" y="178" width="55" height="32" rx="4" fill="#bbdefb" stroke="#1565c0" stroke-width="1.5"/>
  <text x="444" y="198" text-anchor="middle" font-size="9" font-weight="bold" fill="#1565c0">fpln</text>
  <line x1="444" y1="163" x2="444" y2="178" stroke="#888" stroke-width="1"/>

  <rect x="478" y="178" width="55" height="32" rx="4" fill="#bbdefb" stroke="#1565c0" stroke-width="1.5"/>
  <text x="506" y="198" text-anchor="middle" font-size="9" font-weight="bold" fill="#1565c0">wpm</text>
  <line x1="506" y1="163" x2="506" y2="178" stroke="#888" stroke-width="1"/>

  <rect x="540" y="178" width="55" height="32" rx="4" fill="#bbdefb" stroke="#1565c0" stroke-width="1.5"/>
  <text x="568" y="198" text-anchor="middle" font-size="9" font-weight="bold" fill="#1565c0">nfzdb</text>
  <line x1="568" y1="163" x2="568" y2="178" stroke="#888" stroke-width="1"/>

  <rect x="602" y="178" width="55" height="32" rx="4" fill="#f5f5f5" stroke="#757575" stroke-width="1.5"/>
  <text x="630" y="198" text-anchor="middle" font-size="9" font-weight="bold" fill="#757575">cam_mgr</text>
  <line x1="630" y1="163" x2="630" y2="178" stroke="#888" stroke-width="1"/>

  <!-- uart_drv → bus_uart → FC -->
  <rect x="416" y="240" width="65" height="32" rx="4" fill="#bbdefb" stroke="#1565c0" stroke-width="1.5"/>
  <text x="449" y="260" text-anchor="middle" font-size="9" font-weight="bold" fill="#1565c0">uart_drv</text>
  <line x1="449" y1="163" x2="449" y2="240" stroke="#888" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- bus_uart -->
  <rect x="390" y="285" width="200" height="24" rx="4" fill="#e8e8e8" stroke="#888" stroke-width="1.5"/>
  <text x="490" y="301" text-anchor="middle" font-size="9" fill="#555" font-weight="bold">bus_uart</text>
  <line x1="449" y1="272" x2="449" y2="285" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- FC (safety-critical) -->
  <rect x="420" y="325" width="70" height="36" rx="4" fill="#bbdefb" stroke="#c62828" stroke-width="2.5"/>
  <text x="455" y="345" text-anchor="middle" font-size="10" font-weight="bold" fill="#1565c0">FC</text>
  <text x="455" y="357" text-anchor="middle" font-size="7" fill="#c62828">★ safety-critical</text>
  <line x1="455" y1="309" x2="455" y2="325" stroke="#888" stroke-width="1.5"/>

  <!-- GPS -->
  <rect x="520" y="325" width="60" height="36" rx="4" fill="#bbdefb" stroke="#c62828" stroke-width="2"/>
  <text x="550" y="345" text-anchor="middle" font-size="10" font-weight="bold" fill="#1565c0">GPS</text>
  <text x="550" y="357" text-anchor="middle" font-size="7" fill="#c62828">★ safety-critical</text>
  <line x1="550" y1="309" x2="550" y2="325" stroke="#888" stroke-width="1"/>

  <!-- wifi_drv and camera (bus_wifi) -->
  <rect x="602" y="240" width="65" height="32" rx="4" fill="#ffcdd2" stroke="#b71c1c" stroke-width="1.5"/>
  <text x="635" y="260" text-anchor="middle" font-size="9" font-weight="bold" fill="#b71c1c">wifi_drv</text>
  <text x="635" y="234" text-anchor="middle" font-size="7" fill="#b71c1c">untrusted</text>
  <line x1="635" y1="163" x2="635" y2="240" stroke="#888" stroke-width="1" stroke-dasharray="3,3"/>

  <rect x="610" y="310" width="110" height="24" rx="4" fill="#e8e8e8" stroke="#888" stroke-width="1.5"/>
  <text x="665" y="326" text-anchor="middle" font-size="9" fill="#555" font-weight="bold">bus_wifi</text>
  <line x1="635" y1="272" x2="635" y2="310" stroke="#888" stroke-width="1" marker-end="url(#arr)"/>

  <rect x="640" y="346" width="60" height="30" rx="4" fill="#f5f5f5" stroke="#757575" stroke-width="1.5"/>
  <text x="670" y="365" text-anchor="middle" font-size="9" fill="#757575">camera</text>
  <line x1="665" y1="334" x2="670" y2="346" stroke="#888" stroke-width="1"/>

  <!-- swu -->
  <rect x="540" y="240" width="52" height="32" rx="4" fill="#e1bee7" stroke="#6a1b9a" stroke-width="1.5"/>
  <text x="566" y="260" text-anchor="middle" font-size="9" font-weight="bold" fill="#6a1b9a">swu</text>
  <text x="566" y="234" text-anchor="middle" font-size="7" fill="#6a1b9a">privileged</text>
  <line x1="566" y1="163" x2="566" y2="240" stroke="#888" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Policy servers -->
  <rect x="390" y="380" width="80" height="26" rx="4" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="430" y="397" text-anchor="middle" font-size="9" font-weight="bold" fill="#2e7d32">ps_mc</text>
  <text x="430" y="414" text-anchor="middle" font-size="7" fill="#2e7d32">signed ✓</text>
  <line x1="430" y1="380" x2="238" y2="127" stroke="#2e7d32" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr-g)"/>

  <rect x="500" y="380" width="80" height="26" rx="4" fill="#f1f8e9" stroke="#558b2f" stroke-width="1"/>
  <text x="540" y="397" text-anchor="middle" font-size="9" fill="#558b2f">ps_uart</text>
  <text x="540" y="414" text-anchor="middle" font-size="7" fill="#e65100">unsigned ✗</text>
  <line x1="500" y1="390" x2="455" y2="309" stroke="#558b2f" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- SPOF callout -->
  <rect x="180" y="440" width="500" height="34" rx="4" fill="#fff3e0" stroke="#e65100" stroke-width="1.5"/>
  <text x="430" y="456" text-anchor="middle" font-size="9" fill="#e65100" font-weight="bold">⚠ bus_mc is a single-point failure for 5 capabilities (flight_control, navigation, ota_update, attestation, ground_comms)</text>
  <text x="430" y="468" text-anchor="middle" font-size="8" fill="#e65100">All services route through bus_mc — no redundancy exists in this architecture</text>

  <!-- Legend -->
  <rect x="15" y="440" width="155" height="72" rx="4" fill="#fafafa" stroke="#ccc" stroke-width="1"/>
  <rect x="22" y="450" width="12" height="9" fill="#fff9c4" stroke="#f57f17" stroke-width="1"/>
  <text x="38" y="458" font-size="8" fill="#333">◆ CakeML verified</text>
  <rect x="22" y="462" width="12" height="9" fill="#bbdefb" stroke="#1565c0" stroke-width="1"/>
  <text x="38" y="470" font-size="8" fill="#333">High domain</text>
  <rect x="22" y="474" width="12" height="9" fill="#ffcdd2" stroke="#b71c1c" stroke-width="1"/>
  <text x="38" y="482" font-size="8" fill="#333">Untrusted</text>
  <rect x="22" y="486" width="12" height="9" fill="#fce4ec" stroke="#c62828" stroke-width="1"/>
  <text x="38" y="494" font-size="8" fill="#333">🛡 PEP (firewall)</text>
  <text x="22" y="506" font-size="8" fill="#c62828">★ = safety-critical</text>
</svg>
